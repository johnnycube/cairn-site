# CI — sanity-check the static site on every branch and PR.
# NOTE: deployment is currently DISABLED (if: false below) until the public
# launch; once enabled it rsyncs to the static web host on push to main.
# There is no build step, so the check verifies the page and every locally
# referenced asset.
#
# Deploy secrets (all host-specific values live in the CI secret store):
#   DEPLOY_SSH_PASSWORD, DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_PATH

name: Check and deploy

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check page and local assets
        run: |
          test -f index.html
          test -f styles.css
          # every local href/src referenced from index.html must exist
          missing=0
          for ref in $(grep -oE '(href|src)="[^"]+"' index.html \
                       | sed -E 's/^(href|src)="//; s/"$//' \
                       | grep -vE '^(https?:|#|mailto:|\/$)'); do
            if [ ! -f "$ref" ]; then
              echo "missing asset: $ref"
              missing=1
            fi
          done
          exit $missing

      - name: Install rsync + sshpass
        # Deploy disabled until the public launch. To re-enable, replace the
        # line below with:
        # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        if: ${{ false }}
        run: |
          if ! command -v rsync >/dev/null || ! command -v sshpass >/dev/null; then
            apt-get update -qq
            apt-get install -y rsync sshpass
          fi

      - name: Upload to web host
        # Deploy disabled until the public launch. To re-enable, replace the
        # line below with:
        # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        if: ${{ false }}
        env:
          SSHPASS: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -e rsync -avz --delete \
            --chmod=D755,F644 \
            --exclude '.git*' --exclude 'README.md' \
            ./ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
